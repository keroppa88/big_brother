<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiveGrid</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #0f0f0f;
      color: #fff;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* ── タブバー ── */
    #tabbar {
      display: flex;
      align-items: stretch;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      height: 32px;
      flex-shrink: 0;
      overflow-x: auto;
      overflow-y: hidden;
    }
    #tabbar::-webkit-scrollbar { height: 3px; }
    #tabbar::-webkit-scrollbar-thumb { background: #444; }

    .tab {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0 8px 0 12px;
      border-right: 1px solid #333;
      cursor: pointer;
      white-space: nowrap;
      font-size: 12px;
      color: #888;
      flex-shrink: 0;
      user-select: none;
    }
    .tab:hover { background: #252525; color: #ccc; }
    .tab.active { background: #0f0f0f; color: #fff; border-bottom: 2px solid #e00; }

    .tab-name {
      outline: none;
      background: transparent;
      border: none;
      color: inherit;
      font-size: 12px;
      min-width: 20px;
      max-width: 140px;
      cursor: pointer;
      pointer-events: none;
    }
    .tab-name.editing {
      pointer-events: auto;
      cursor: text;
      border-bottom: 1px solid #888;
    }

    .tab-close {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      padding: 1px 2px;
      border-radius: 3px;
    }
    .tab-close:hover { color: #f44; background: #333; }

    #btn-add-tab {
      background: none;
      border: none;
      color: #777;
      cursor: pointer;
      font-size: 18px;
      padding: 0 14px;
      flex-shrink: 0;
      align-self: center;
    }
    #btn-add-tab:hover { color: #fff; }

    #btn-fullscreen {
      background: none;
      border: none;
      border-right: 1px solid #333;
      color: #777;
      cursor: pointer;
      font-size: 15px;
      padding: 0 12px;
      flex-shrink: 0;
      align-self: stretch;
      display: flex;
      align-items: center;
    }
    #btn-fullscreen:hover { color: #fff; background: #252525; }

    /* ── グリッド ── */
    #grid-wrap { flex: 1; min-height: 0; overflow: hidden; }

    .grid {
      display: grid;
      grid-template-rows: repeat(3, auto);
      grid-template-columns: repeat(3, auto);
      gap: 5px;
      padding: 5px;
      height: 100%;
      justify-content: start;
      align-content: start;
    }

    .cell {
      position: relative;
      background: #111;
      border-radius: 3px;
      overflow: hidden;
      height: calc((100vh - 32px - 20px) / 3);
      aspect-ratio: 16 / 9;
    }

    .cell iframe { width: 100%; height: 100%; border: none; display: block; }

    /* チャンネルモード表示 */
    .cell-label {
      position: absolute;
      bottom: 5px;
      left: 5px;
      background: rgba(0,0,0,0.6);
      color: #0af;
      font-size: 10px;
      padding: 2px 5px;
      border-radius: 3px;
      pointer-events: none;
      z-index: 5;
    }

    .cell-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #666;
    }

    .edit-btn {
      position: absolute;
      top: 5px;
      right: 5px;
      background: rgba(0,0,0,0.55);
      border: 1px solid #555;
      color: #fff;
      border-radius: 3px;
      padding: 2px 7px;
      font-size: 11px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 10;
    }
    .cell:hover .edit-btn { opacity: 1; }

    /* ── モーダル ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .overlay.open { display: flex; }

    #modal {
      background: #1e1e1e;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 20px;
      width: 500px;
      max-width: 94vw;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    #modal h2 { font-size: 13px; color: #bbb; }

    /* モード切替タブ */
    .mode-tabs {
      display: flex;
      gap: 0;
      border: 1px solid #444;
      border-radius: 5px;
      overflow: hidden;
    }
    .mode-tab {
      flex: 1;
      background: #111;
      border: none;
      color: #777;
      font-size: 12px;
      padding: 6px;
      cursor: pointer;
    }
    .mode-tab.active { background: #333; color: #fff; }

    /* URLモード */
    #pane-url input {
      width: 100%;
      background: #111;
      border: 1px solid #555;
      color: #fff;
      border-radius: 4px;
      padding: 7px 10px;
      font-size: 13px;
      outline: none;
    }
    #pane-url input:focus { border-color: #999; }

    /* チャンネルモード */
    #pane-ch { display: flex; flex-direction: column; gap: 8px; }
    #pane-ch .ch-row { display: flex; gap: 6px; }
    #ch-id-input {
      flex: 1;
      background: #111;
      border: 1px solid #444;
      color: #fff;
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 12px;
      outline: none;
    }
    #ch-id-input:focus { border-color: #777; }
    #btn-fetch, #btn-set-ch {
      background: #333;
      border: 1px solid #555;
      color: #ccc;
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
    }
    #btn-fetch:hover, #btn-set-ch:hover { background: #444; color: #fff; }
    #btn-set-ch { background: #800; border-color: #a00; color: #fcc; }
    #btn-set-ch:hover { background: #a00; }

    #video-list {
      max-height: 180px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    #video-list::-webkit-scrollbar { width: 4px; }
    #video-list::-webkit-scrollbar-thumb { background: #444; }

    .video-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 6px;
      border-radius: 4px;
      cursor: pointer;
      background: #161616;
    }
    .video-item:hover { background: #2a2a2a; }
    .video-item.selected { background: #1a3a1a; outline: 1px solid #4a4; }

    .video-item img { width: 80px; height: 45px; object-fit: cover; border-radius: 2px; flex-shrink: 0; }
    .video-item-info { flex: 1; min-width: 0; }
    .video-item-title { font-size: 11px; color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .video-item-date  { font-size: 10px; color: #666; margin-top: 2px; }

    #fetch-status { font-size: 11px; color: #888; text-align: center; padding: 6px 0; }

    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }
    .modal-actions button {
      padding: 6px 16px; border-radius: 4px; border: none; cursor: pointer; font-size: 12px;
    }
    #btn-cancel { background: #333; color: #bbb; }
    #btn-apply  { background: #c00; color: #fff; }
    #btn-apply:hover { background: #e00; }
  </style>
</head>
<body>

<div id="tabbar">
  <button id="btn-fullscreen" title="全画面">⛶</button>
  <button id="btn-add-tab" title="タブを追加">＋</button>
</div>

<div id="grid-wrap"></div>

<div id="modal-overlay" class="overlay">
  <div id="modal">
    <h2>マスの設定</h2>

    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="url">動画URLを指定</button>
      <button class="mode-tab" data-mode="ch">チャンネルの最新動画を自動再生</button>
    </div>

    <!-- URL モード -->
    <div id="pane-url">
      <input id="url-input" type="text" placeholder="https://www.youtube.com/watch?v=...">
    </div>

    <!-- チャンネルモード -->
    <div id="pane-ch" style="display:none">
      <div class="ch-row">
        <input id="ch-id-input" type="text" placeholder="チャンネルID（UCxxxxxxxxx）">
        <button id="btn-fetch">動画一覧を取得</button>
      </div>
      <div id="video-list">
        <div id="fetch-status">チャンネルIDを入力して「取得」を押してください</div>
      </div>
      <div style="display:flex; gap:6px; align-items:center;">
        <button id="btn-set-ch">このチャンネルの最新動画を自動再生にセット</button>
      </div>
    </div>

    <div class="modal-actions">
      <button id="btn-cancel">キャンセル</button>
      <button id="btn-apply">適用</button>
    </div>
  </div>
</div>

<script>
  const DEFAULT_VIDEOS = [
    '8H3nRCFVR6Y','gFRtAAmiFbE','68DhvzKCVOc',
    'lA6TaaMGgDo','YZMZSqz9fx8','GsD9QQEKSzQ',
    'i2PpmC1IeKk','OuCbntsMsWY','X5rq4ioggLk',
  ];
  const STORAGE_KEY = 'livegrid_v2';
  const CH_KEY      = 'livegrid_channel';
  const RSS2JSON = 'https://api.rss2json.com/v1/api.json?rss_url=';

  function defaultData() {
    return { tabs: [{ id: 1, name: 'タブ 1', videos: [...DEFAULT_VIDEOS] }], active: 0, next: 2 };
  }
  function load() {
    try { const s = localStorage.getItem(STORAGE_KEY); if (s) return JSON.parse(s); } catch {}
    return defaultData();
  }
  function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  let state = load();

  function extractId(url) {
    url = url.trim();
    const m = url.match(/youtu\.be\/([^?&]+)/) || url.match(/[?&]v=([^&]+)/) || url.match(/embed\/([^?&]+)/);
    if (m) return m[1];
    if (/^[\w-]{11}$/.test(url)) return url;
    return null;
  }
  function embedSrc(id) { return `https://www.youtube.com/embed/${id}?autoplay=1&mute=1`; }
  function isChannel(v) { return typeof v === 'string' && v.startsWith('ch:'); }
  function chId(v) { return v.slice(3); }

  /* rss2json 経由でチャンネルの動画リストを取得 */
  async function fetchVideoList(channelId) {
    const rssUrl = `https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`;
    const res = await fetch(RSS2JSON + encodeURIComponent(rssUrl));
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (json.status !== 'ok') throw new Error(json.message || '取得失敗');
    return json.items.map(item => {
      const m = item.link.match(/[?&]v=([\w-]{11})/);
      return { id: m ? m[1] : '', title: item.title, pub: item.pubDate };
    }).filter(v => v.id);
  }

  /* 最新動画ID1件だけ取得 */
  async function fetchLatestId(channelId) {
    const list = await fetchVideoList(channelId);
    if (!list.length) throw new Error('動画が見つかりません');
    return list[0].id;
  }

  /* ── タブバー ── */
  const tabbar   = document.getElementById('tabbar');
  const btnAdd   = document.getElementById('btn-add-tab');
  const gridWrap = document.getElementById('grid-wrap');

  function renderTabs() {
    tabbar.querySelectorAll('.tab').forEach(el => el.remove());
    state.tabs.forEach((tab, i) => {
      const div = document.createElement('div');
      div.className = 'tab' + (i === state.active ? ' active' : '');

      const nameEl = document.createElement('input');
      nameEl.className = 'tab-name';
      nameEl.type = 'text';
      nameEl.value = tab.name;

      div.addEventListener('click', () => {
        if (state.active !== i) { state.active = i; save(); renderTabs(); renderGrid(); }
      });
      div.addEventListener('dblclick', (e) => {
        e.stopPropagation();
        nameEl.classList.add('editing');
        nameEl.focus(); nameEl.select();
      });
      nameEl.addEventListener('blur', () => {
        nameEl.classList.remove('editing');
        const v = nameEl.value.trim() || `タブ ${tab.id}`;
        nameEl.value = v; state.tabs[i].name = v; save();
      });
      nameEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === 'Escape') nameEl.blur();
        e.stopPropagation();
      });

      const closeBtn = document.createElement('button');
      closeBtn.className = 'tab-close';
      closeBtn.textContent = '×';
      closeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (state.tabs.length === 1) return;
        state.tabs.splice(i, 1);
        if (state.active >= state.tabs.length) state.active = state.tabs.length - 1;
        save(); renderTabs(); renderGrid();
      });

      div.appendChild(nameEl);
      div.appendChild(closeBtn);
      tabbar.insertBefore(div, btnAdd);
    });
  }

  btnAdd.addEventListener('click', () => {
    state.tabs.push({ id: state.next++, name: `タブ ${state.next - 1}`, videos: Array(9).fill('') });
    state.active = state.tabs.length - 1;
    save(); renderTabs(); renderGrid();
  });

  /* ── グリッド ── */
  function renderGrid() {
    gridWrap.innerHTML = '';
    const tab  = state.tabs[state.active];
    const grid = document.createElement('div');
    grid.className = 'grid';

    tab.videos.forEach((val, ci) => {
      const cell = document.createElement('div');
      cell.className = 'cell';

      if (isChannel(val)) {
        /* チャンネルモード：最新動画を非同期取得 */
        const loading = document.createElement('div');
        loading.className = 'cell-loading';
        loading.textContent = '最新動画を取得中…';
        cell.appendChild(loading);

        const label = document.createElement('div');
        label.className = 'cell-label';
        label.textContent = '⟳ 自動';
        cell.appendChild(label);

        fetchLatestId(chId(val)).then(videoId => {
          loading.remove();
          const iframe = document.createElement('iframe');
          iframe.src = embedSrc(videoId);
          iframe.allow = 'autoplay; encrypted-media';
          iframe.allowFullscreen = true;
          cell.insertBefore(iframe, label);
        }).catch(err => {
          loading.textContent = `取得失敗: ${err.message}`;
        });

      } else if (val) {
        const iframe = document.createElement('iframe');
        iframe.src = embedSrc(val);
        iframe.allow = 'autoplay; encrypted-media';
        iframe.allowFullscreen = true;
        cell.appendChild(iframe);
      }

      const btn = document.createElement('button');
      btn.className = 'edit-btn';
      btn.textContent = '✎ 変更';
      btn.addEventListener('click', () => openModal(ci));
      cell.appendChild(btn);

      grid.appendChild(cell);
    });

    gridWrap.appendChild(grid);
  }

  /* ── モーダル ── */
  const overlay  = document.getElementById('modal-overlay');
  const urlInput = document.getElementById('url-input');
  const chInput  = document.getElementById('ch-id-input');
  const paneUrl  = document.getElementById('pane-url');
  const paneCh   = document.getElementById('pane-ch');
  const videoList   = document.getElementById('video-list');
  const fetchStatus = document.getElementById('fetch-status');
  let editingCell = null;
  let currentMode = 'url';
  let selectedVideoId = null;

  /* モード切替 */
  document.querySelectorAll('.mode-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      currentMode = btn.dataset.mode;
      document.querySelectorAll('.mode-tab').forEach(b => b.classList.toggle('active', b === btn));
      paneUrl.style.display = currentMode === 'url' ? '' : 'none';
      paneCh.style.display  = currentMode === 'ch'  ? '' : 'none';
    });
  });

  function openModal(cellIndex) {
    editingCell = cellIndex;
    const val = state.tabs[state.active].videos[cellIndex];
    selectedVideoId = null;
    videoList.querySelectorAll('.video-item').forEach(el => el.remove());
    fetchStatus.style.display = 'block';
    fetchStatus.textContent = 'チャンネルIDを入力して「取得」を押してください';

    if (isChannel(val)) {
      /* チャンネルモードのセル */
      switchMode('ch');
      chInput.value = chId(val);
      const saved = localStorage.getItem(CH_KEY);
      if (!chInput.value && saved) chInput.value = saved;
    } else {
      switchMode('url');
      urlInput.value = val ? `https://www.youtube.com/watch?v=${val}` : '';
      urlInput.style.borderColor = '';
      const saved = localStorage.getItem(CH_KEY);
      if (saved) chInput.value = saved;
    }

    overlay.classList.add('open');
    if (currentMode === 'url') { urlInput.focus(); urlInput.select(); }
    else chInput.focus();
  }

  function switchMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.mode-tab').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
    paneUrl.style.display = mode === 'url' ? '' : 'none';
    paneCh.style.display  = mode === 'ch'  ? '' : 'none';
  }

  function closeModal() { overlay.classList.remove('open'); editingCell = null; }

  document.getElementById('btn-cancel').addEventListener('click', closeModal);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });

  document.getElementById('btn-apply').addEventListener('click', () => {
    if (currentMode === 'url') {
      const id = extractId(urlInput.value);
      if (!id && urlInput.value.trim() !== '') {
        urlInput.style.borderColor = '#f55'; urlInput.focus(); return;
      }
      state.tabs[state.active].videos[editingCell] = id || '';
    } else {
      /* チャンネルモード：選択した動画IDを使う */
      if (!selectedVideoId) {
        fetchStatus.style.color = '#f55';
        fetchStatus.textContent = '動画を1つ選択してください';
        fetchStatus.style.display = 'block';
        return;
      }
      state.tabs[state.active].videos[editingCell] = selectedVideoId;
    }
    save(); renderGrid(); closeModal();
  });

  urlInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('btn-apply').click();
    if (e.key === 'Escape') closeModal();
  });

  /* チャンネル動画リスト取得 */
  document.getElementById('btn-fetch').addEventListener('click', async () => {
    const id = chInput.value.trim();
    if (!id) return;
    localStorage.setItem(CH_KEY, id);
    fetchStatus.textContent = '取得中…';
    fetchStatus.style.color = '#888';
    fetchStatus.style.display = 'block';
    videoList.querySelectorAll('.video-item').forEach(el => el.remove());
    selectedVideoId = null;

    try {
      const videos = await fetchVideoList(id);
      fetchStatus.style.display = 'none';
      videos.forEach(v => {
        const item = document.createElement('div');
        item.className = 'video-item';
        item.dataset.id = v.id;
        const date = v.pub ? new Date(v.pub).toLocaleDateString('ja-JP') : '';
        item.innerHTML = `
          <img src="https://i.ytimg.com/vi/${v.id}/mqdefault.jpg" alt="">
          <div class="video-item-info">
            <div class="video-item-title" title="${v.title.replace(/"/g,'&quot;')}">${v.title}</div>
            <div class="video-item-date">${date}</div>
          </div>`;
        item.addEventListener('click', () => {
          videoList.querySelectorAll('.video-item').forEach(el => el.classList.remove('selected'));
          item.classList.add('selected');
          selectedVideoId = v.id;
          urlInput.value = `https://www.youtube.com/watch?v=${v.id}`;
        });
        videoList.appendChild(item);
      });
    } catch (e) {
      fetchStatus.textContent = `取得失敗: ${e.message}`;
    }
  });

  chInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('btn-fetch').click();
  });

  /* 「最新動画を自動再生にセット」ボタン */
  document.getElementById('btn-set-ch').addEventListener('click', () => {
    const id = chInput.value.trim();
    if (!id) { chInput.focus(); return; }
    localStorage.setItem(CH_KEY, id);
    state.tabs[state.active].videos[editingCell] = `ch:${id}`;
    save(); renderGrid(); closeModal();
  });

  /* ── 全画面 ── */
  const btnFs = document.getElementById('btn-fullscreen');
  btnFs.addEventListener('click', () => {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  });
  document.addEventListener('fullscreenchange', () => {
    btnFs.textContent = document.fullscreenElement ? '✕' : '⛶';
    btnFs.title = document.fullscreenElement ? '全画面を解除' : '全画面';
  });

  renderTabs();
  renderGrid();
</script>
</body>
</html>
