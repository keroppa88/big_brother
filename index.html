<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiveGrid</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #0f0f0f;
      color: #fff;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* ── タブバー ── */
    #tabbar {
      display: flex;
      align-items: stretch;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      height: 32px;
      flex-shrink: 0;
      overflow-x: auto;
      overflow-y: hidden;
    }
    #tabbar::-webkit-scrollbar { height: 3px; }
    #tabbar::-webkit-scrollbar-thumb { background: #444; }

    .tab {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0 8px 0 12px;
      border-right: 1px solid #333;
      cursor: pointer;
      white-space: nowrap;
      font-size: 12px;
      color: #888;
      flex-shrink: 0;
      user-select: none;
    }
    .tab:hover { background: #252525; color: #ccc; }
    .tab.active { background: #0f0f0f; color: #fff; border-bottom: 2px solid #e00; }

    .tab-name {
      outline: none;
      background: transparent;
      border: none;
      color: inherit;
      font-size: 12px;
      min-width: 20px;
      max-width: 140px;
      cursor: pointer;
      pointer-events: none;
    }
    .tab-name.editing {
      pointer-events: auto;
      cursor: text;
      border-bottom: 1px solid #888;
    }

    .tab-close {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      padding: 1px 2px;
      border-radius: 3px;
    }
    .tab-close:hover { color: #f44; background: #333; }

    #btn-add-tab {
      background: none;
      border: none;
      color: #777;
      cursor: pointer;
      font-size: 18px;
      padding: 0 14px;
      flex-shrink: 0;
      align-self: center;
    }
    #btn-add-tab:hover { color: #fff; }

    #btn-fullscreen {
      background: none;
      border: none;
      border-right: 1px solid #333;
      color: #777;
      cursor: pointer;
      font-size: 15px;
      padding: 0 12px;
      flex-shrink: 0;
      align-self: stretch;
      display: flex;
      align-items: center;
    }
    #btn-fullscreen:hover { color: #fff; background: #252525; }

    /* ── グリッド ── */
    #grid-wrap {
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .grid {
      display: grid;
      grid-template-rows: repeat(3, auto);
      grid-template-columns: repeat(3, auto);
      gap: 5px;
      padding: 5px;
      height: 100%;
      justify-content: start;
      align-content: start;
    }

    .cell {
      position: relative;
      background: #111;
      border-radius: 3px;
      overflow: hidden;
      height: calc((100vh - 32px - 5px * 2 - 5px * 2) / 3);
      aspect-ratio: 16 / 9;
    }

    .cell iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .edit-btn {
      position: absolute;
      top: 5px;
      right: 5px;
      background: rgba(0,0,0,0.55);
      border: 1px solid #555;
      color: #fff;
      border-radius: 3px;
      padding: 2px 7px;
      font-size: 11px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 10;
    }
    .cell:hover .edit-btn { opacity: 1; }

    /* ── モーダル共通 ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .overlay.open { display: flex; }

    /* ── URL 変更モーダル ── */
    #modal {
      background: #1e1e1e;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 20px;
      width: 500px;
      max-width: 94vw;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #modal h2 { font-size: 13px; color: #bbb; }

    #modal .url-row { display: flex; gap: 8px; }
    #modal .url-row input {
      flex: 1;
      background: #111;
      border: 1px solid #555;
      color: #fff;
      border-radius: 4px;
      padding: 7px 10px;
      font-size: 13px;
      outline: none;
    }
    #modal .url-row input:focus { border-color: #999; }

    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }
    .modal-actions button {
      padding: 6px 16px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-size: 12px;
    }
    #btn-cancel { background: #333; color: #bbb; }
    #btn-apply  { background: #c00; color: #fff; }
    #btn-apply:hover { background: #e00; }

    /* ── チャンネル最新動画 ── */
    #channel-section { border-top: 1px solid #333; padding-top: 12px; }
    #channel-section h3 { font-size: 11px; color: #888; margin-bottom: 8px; }

    #channel-controls { display: flex; gap: 6px; margin-bottom: 8px; }
    #ch-id-input {
      flex: 1;
      background: #111;
      border: 1px solid #444;
      color: #fff;
      border-radius: 4px;
      padding: 5px 8px;
      font-size: 11px;
      outline: none;
    }
    #ch-id-input:focus { border-color: #777; }
    #btn-fetch {
      background: #333;
      border: 1px solid #555;
      color: #ccc;
      border-radius: 4px;
      padding: 5px 10px;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
    }
    #btn-fetch:hover { background: #444; color: #fff; }

    #video-list {
      max-height: 180px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    #video-list::-webkit-scrollbar { width: 4px; }
    #video-list::-webkit-scrollbar-thumb { background: #444; }

    .video-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 6px;
      border-radius: 4px;
      cursor: pointer;
      background: #161616;
    }
    .video-item:hover { background: #282828; }

    .video-item img {
      width: 80px;
      height: 45px;
      object-fit: cover;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .video-item-info { flex: 1; min-width: 0; }
    .video-item-title {
      font-size: 11px;
      color: #ddd;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .video-item-date { font-size: 10px; color: #666; margin-top: 2px; }

    #fetch-status { font-size: 11px; color: #888; text-align: center; padding: 8px 0; }
  </style>
</head>
<body>

<div id="tabbar">
  <button id="btn-fullscreen" title="全画面">⛶</button>
  <button id="btn-add-tab" title="タブを追加">＋</button>
</div>

<div id="grid-wrap"></div>

<div id="modal-overlay" class="overlay">
  <div id="modal">
    <h2>YouTube URL を変更</h2>
    <div class="url-row">
      <input id="url-input" type="text" placeholder="https://www.youtube.com/watch?v=...">
    </div>
    <div class="modal-actions">
      <button id="btn-cancel">キャンセル</button>
      <button id="btn-apply">適用</button>
    </div>

    <div id="channel-section">
      <h3>チャンネルの最新動画から選ぶ</h3>
      <div id="channel-controls">
        <input id="ch-id-input" type="text" placeholder="チャンネルID（UCxxxxxxxxx）">
        <button id="btn-fetch">取得</button>
      </div>
      <div id="video-list">
        <div id="fetch-status">チャンネルIDを入力して「取得」を押してください</div>
      </div>
    </div>
  </div>
</div>

<script>
  /* ── 定数 ── */
  const DEFAULT_VIDEOS = [
    '8H3nRCFVR6Y','gFRtAAmiFbE','68DhvzKCVOc',
    'lA6TaaMGgDo','YZMZSqz9fx8','GsD9QQEKSzQ',
    'i2PpmC1IeKk','OuCbntsMsWY','X5rq4ioggLk',
  ];
  const STORAGE_KEY = 'livegrid_v2';
  const CH_KEY      = 'livegrid_channel';

  /* ── データ ── */
  function defaultData() {
    return { tabs: [{ id: 1, name: 'タブ 1', videos: [...DEFAULT_VIDEOS] }], active: 0, next: 2 };
  }
  function load() {
    try { const s = localStorage.getItem(STORAGE_KEY); if (s) return JSON.parse(s); } catch {}
    return defaultData();
  }
  function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

  let state = load();

  /* ── ユーティリティ ── */
  function extractId(url) {
    url = url.trim();
    const m = url.match(/youtu\.be\/([^?&]+)/) || url.match(/[?&]v=([^&]+)/) || url.match(/embed\/([^?&]+)/);
    if (m) return m[1];
    if (/^[\w-]{11}$/.test(url)) return url;
    return null;
  }
  function embedSrc(id) { return `https://www.youtube.com/embed/${id}?autoplay=1&mute=1`; }

  /* ── タブバー描画 ── */
  const tabbar   = document.getElementById('tabbar');
  const btnAdd   = document.getElementById('btn-add-tab');
  const gridWrap = document.getElementById('grid-wrap');

  function renderTabs() {
    tabbar.querySelectorAll('.tab').forEach(el => el.remove());

    state.tabs.forEach((tab, i) => {
      const div = document.createElement('div');
      div.className = 'tab' + (i === state.active ? ' active' : '');

      const nameEl = document.createElement('input');
      nameEl.className = 'tab-name';
      nameEl.type = 'text';
      nameEl.value = tab.name;

      div.addEventListener('click', () => {
        if (state.active !== i) { state.active = i; save(); renderTabs(); renderGrid(); }
      });
      div.addEventListener('dblclick', (e) => {
        e.stopPropagation();
        nameEl.classList.add('editing');
        nameEl.focus();
        nameEl.select();
      });
      nameEl.addEventListener('blur', () => {
        nameEl.classList.remove('editing');
        const v = nameEl.value.trim() || `タブ ${tab.id}`;
        nameEl.value = v;
        state.tabs[i].name = v;
        save();
      });
      nameEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === 'Escape') nameEl.blur();
        e.stopPropagation();
      });

      const closeBtn = document.createElement('button');
      closeBtn.className = 'tab-close';
      closeBtn.textContent = '×';
      closeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (state.tabs.length === 1) return;
        state.tabs.splice(i, 1);
        if (state.active >= state.tabs.length) state.active = state.tabs.length - 1;
        save(); renderTabs(); renderGrid();
      });

      div.appendChild(nameEl);
      div.appendChild(closeBtn);
      tabbar.insertBefore(div, btnAdd);
    });
  }

  btnAdd.addEventListener('click', () => {
    state.tabs.push({ id: state.next++, name: `タブ ${state.next - 1}`, videos: Array(9).fill('') });
    state.active = state.tabs.length - 1;
    save(); renderTabs(); renderGrid();
  });

  /* ── グリッド描画 ── */
  function renderGrid() {
    gridWrap.innerHTML = '';
    const tab = state.tabs[state.active];
    const grid = document.createElement('div');
    grid.className = 'grid';

    tab.videos.forEach((id, ci) => {
      const cell = document.createElement('div');
      cell.className = 'cell';

      if (id) {
        const iframe = document.createElement('iframe');
        iframe.src = embedSrc(id);
        iframe.allow = 'autoplay; encrypted-media';
        iframe.allowFullscreen = true;
        cell.appendChild(iframe);
      }

      const btn = document.createElement('button');
      btn.className = 'edit-btn';
      btn.textContent = '✎ 変更';
      btn.addEventListener('click', () => openModal(ci));
      cell.appendChild(btn);

      grid.appendChild(cell);
    });

    gridWrap.appendChild(grid);
  }

  /* ── URL 変更モーダル ── */
  const overlay  = document.getElementById('modal-overlay');
  const urlInput = document.getElementById('url-input');
  let editingCell = null;

  function openModal(cellIndex) {
    editingCell = cellIndex;
    const id = state.tabs[state.active].videos[cellIndex];
    urlInput.value = id ? `https://www.youtube.com/watch?v=${id}` : '';
    urlInput.style.borderColor = '';
    overlay.classList.add('open');
    urlInput.focus();
    urlInput.select();
    // 前回のチャンネルIDを復元
    const savedCh = localStorage.getItem(CH_KEY);
    if (savedCh) document.getElementById('ch-id-input').value = savedCh;
  }
  function closeModal() { overlay.classList.remove('open'); editingCell = null; }

  document.getElementById('btn-cancel').addEventListener('click', closeModal);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });

  document.getElementById('btn-apply').addEventListener('click', () => {
    const id = extractId(urlInput.value);
    if (!id && urlInput.value.trim() !== '') {
      urlInput.style.borderColor = '#f55'; urlInput.focus(); return;
    }
    state.tabs[state.active].videos[editingCell] = id || '';
    save(); renderGrid(); closeModal();
  });

  urlInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('btn-apply').click();
    if (e.key === 'Escape') closeModal();
  });

  /* ── チャンネル最新動画取得 ── */
  const videoList  = document.getElementById('video-list');
  const fetchStatus = document.getElementById('fetch-status');
  const chInput    = document.getElementById('ch-id-input');
  const btnFetch   = document.getElementById('btn-fetch');

  async function fetchChannelVideos(channelId) {
    fetchStatus.textContent = '取得中…';
    fetchStatus.style.display = 'block';
    videoList.querySelectorAll('.video-item').forEach(el => el.remove());

    const rssUrl = `https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`;
    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(rssUrl)}`;

    let xml;
    try {
      const res = await fetch(proxyUrl);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      xml = new DOMParser().parseFromString(text, 'application/xml');
    } catch (e) {
      fetchStatus.textContent = `取得失敗: ${e.message}`;
      return;
    }

    const entries = Array.from(xml.querySelectorAll('entry'));
    if (entries.length === 0) {
      fetchStatus.textContent = '動画が見つかりませんでした';
      return;
    }

    fetchStatus.style.display = 'none';

    entries.forEach(entry => {
      const videoId = entry.querySelector('videoId')?.textContent;
      const title   = entry.querySelector('title')?.textContent || '(タイトルなし)';
      const pub     = entry.querySelector('published')?.textContent;
      if (!videoId) return;

      const date = pub ? new Date(pub).toLocaleDateString('ja-JP') : '';

      const item = document.createElement('div');
      item.className = 'video-item';
      item.innerHTML = `
        <img src="https://i.ytimg.com/vi/${videoId}/mqdefault.jpg" alt="">
        <div class="video-item-info">
          <div class="video-item-title" title="${title.replace(/"/g,'&quot;')}">${title}</div>
          <div class="video-item-date">${date}</div>
        </div>
      `;
      item.addEventListener('click', () => {
        urlInput.value = `https://www.youtube.com/watch?v=${videoId}`;
        urlInput.style.borderColor = '';
      });
      videoList.appendChild(item);
    });
  }

  btnFetch.addEventListener('click', () => {
    const chId = chInput.value.trim();
    if (!chId) return;
    localStorage.setItem(CH_KEY, chId);
    fetchChannelVideos(chId);
  });

  chInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') btnFetch.click();
  });

  /* ── 全画面 ── */
  const btnFs = document.getElementById('btn-fullscreen');
  btnFs.addEventListener('click', () => {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  });
  document.addEventListener('fullscreenchange', () => {
    btnFs.textContent = document.fullscreenElement ? '✕' : '⛶';
    btnFs.title = document.fullscreenElement ? '全画面を解除' : '全画面';
  });

  /* ── 初期描画 ── */
  renderTabs();
  renderGrid();
</script>
</body>
</html>
